<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Masuk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="css/masuk.css">
  <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="back">←</span>
  <span class="title">Masuk</span>
</div>

<!-- CONTENT -->
<div class="content">

  <h2>Masukkan PIN</h2>

  <!-- DOT PIN -->
  <div class="pin-dots">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- HELP -->
  <div class="help">
    <div class="left">
      <img src="assets/hc-home-contact.svg">
      <span>BUTUH BANTUAN?</span>
    </div>

    <div class="right">
      LUPA PIN?
    </div>
  </div>

</div>





<div class="keypad">

  <div class="row">
    <button>1</button>
    <button>2</button>
    <button>3</button>
  </div>

  <div class="row">
    <button>4</button>
    <button>5</button>
    <button>6</button>
  </div>

  <div class="row">
    <button>7</button>
    <button>8</button>
    <button>9</button>
  </div>

  <div class="row">
    <button></button>
    <button>0</button>
    <button id="hapus">⌫</button>
  </div>

</div>














<script src="js/masuk.js"></script>
</body>
</html>
